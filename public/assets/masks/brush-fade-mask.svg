<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <filter id="brushEdge" x="-35%" y="-35%" width="170%" height="170%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.11" numOctaves="6" seed="31" result="noise" />
      <feGaussianBlur in="noise" stdDeviation="2.2" result="softNoise" />
      <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="22" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    <linearGradient id="topBottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="6%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="14%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="22%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="78%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="86%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="94%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="sideFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="10%" stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="18%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="82%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="90%" stop-color="#ffffff" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#topBottomFade)" filter="url(#brushEdge)" />
  <rect width="100" height="100" fill="url(#sideFade)" style="mix-blend-mode:multiply" />
</svg>
